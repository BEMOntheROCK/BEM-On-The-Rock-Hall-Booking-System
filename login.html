<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — BEM On The Rock</title>
  <link rel="icon" type="image/png" href="assets/favicon.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="login-page">
    <div class="login-card">

      <!-- Logo & Title -->
      <div class="login-card__logo">
        <img src="assets/logo.png" alt="BEM On The Rock" onerror="this.style.display='none'" />
        <h2>BEM On The Rock</h2>
        <p>Hall Booking — Admin</p>
      </div>

      <!-- Error Banner -->
      <div class="login-error" id="loginError" style="display:none;">
        <span>⚠</span>
        <span id="loginErrorMsg">Invalid email or password.</span>
      </div>

      <!-- Form -->
      <form id="loginForm" novalidate>

        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input
            class="form-input"
            type="email"
            id="email"
            placeholder="admin@bemotr.com"
            autocomplete="email"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="password-wrapper">
            <input
              class="form-input"
              type="password"
              id="password"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            />
            <button type="button" class="password-toggle" id="passwordToggle" aria-label="Show password">
              <span id="toggleIcon">👁</span>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn--primary" style="width:100%; margin-top: var(--space-sm);" id="loginBtn">
          Sign In
        </button>

      </form>

      <p style="text-align:center; margin-top: var(--space-lg); font-size: 0.78rem; color: var(--silver-dark);">
        Access restricted to authorised church office staff only.
      </p>

      <a href="index.html" class="back-link" style="display:flex; justify-content:center; margin-top: var(--space-md);">&#8592; Back to main page</a>

    </div>
  </div>

  <div id="toast-container"></div>
  <script type="module" src="login.js"></script>
</body>
</html>
